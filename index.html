<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cypher Motorsports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <h1>Cypher Motorsports</h1>
    <p>Decode the machine. Explore specs, builds, and vehicle profiles.</p>

    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search by make, model, engine, drivetrain..."
    />
  </header>

  <main>
    <section class="filters">
  <button onclick="filterVehicles('All')">All</button>
  <button onclick="filterVehicles('JDM')">JDM</button>
  <button onclick="filterVehicles('Euro')">Euro</button>
  <button onclick="filterVehicles('Muscle')">Muscle</button>
  <button onclick="filterVehicles('Luxury')">Luxury</button>
  <button onclick="filterVehicles('Track')">Track</button>
</section>

    <section id="vehicleList" class="vehicle-grid">
      <!-- Vehicle cards load here -->
    </section>

    <section id="vehicleDetail" class="vehicle-detail">
      <h2>Select a vehicle</h2>
      <p>Vehicle specs and build details will appear here.</p>
    </section>
  </main>

  <footer>
    <p>© 2026 Cypher Motorsports</p>
  </footer>

  <script src="vehicles.js"></script>
  <script src="app.js"></script>
</body>
</html>
